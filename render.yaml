services:
  - type: web
    name: evaluador-cine-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false        # lo cargás manualmente en el dashboard de Render
      - key: SECRET_KEY
        sync: false        # idem — generá uno random largo
